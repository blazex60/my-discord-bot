name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bot:
        description: 'デプロイするボットを選択'
        required: true
        type: choice
        options:
          - chat-summary-bot
          - vc-disconnect-bot
          - discord-minutes-bot
          - find-senryu-bot

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      chat-summary-bot: ${{ steps.filter.outputs.chat-summary-bot }}
      vc-disconnect-bot: ${{ steps.filter.outputs.vc-disconnect-bot }}
      discord-minutes-bot: ${{ steps.filter.outputs.discord-minutes-bot }}
      find-senryu-bot: ${{ steps.filter.outputs.find-senryu-bot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            chat-summary-bot:
              - 'chat-summary-bot/**'
            vc-disconnect-bot:
              - 'vc-disconnect-bot/**'
            discord-minutes-bot:
              - 'discord-minutes-bot/**'
            find-senryu-bot:
              - 'find-senryu-bot/**'

  deploy-chat-summary-bot:
    needs: changes
    if: (github.event_name == 'push' && needs.changes.outputs.chat-summary-bot == 'true') || (github.event_name == 'workflow_dispatch' && inputs.bot == 'chat-summary-bot')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy chat-summary-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd chat-summary-bot
            docker compose up --build -d

  deploy-vc-disconnect-bot:
    needs: changes
    if: (github.event_name == 'push' && needs.changes.outputs.vc-disconnect-bot == 'true') || (github.event_name == 'workflow_dispatch' && inputs.bot == 'vc-disconnect-bot')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy vc-disconnect-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd vc-disconnect-bot
            docker compose up --build -d

  deploy-discord-minutes-bot:
    needs: changes
    if: (github.event_name == 'push' && needs.changes.outputs.discord-minutes-bot == 'true') || (github.event_name == 'workflow_dispatch' && inputs.bot == 'discord-minutes-bot')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy discord-minutes-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd discord-minutes-bot
            docker compose up --build -d

  deploy-find-senryu-bot:
    needs: changes
    if: (github.event_name == 'push' && needs.changes.outputs.find-senryu-bot == 'true') || (github.event_name == 'workflow_dispatch' && inputs.bot == 'find-senryu-bot')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy find-senryu-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd find-senryu-bot
            docker compose up --build -d
