name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      music-bot: ${{ steps.filter.outputs.music-bot }}
      chat-summary-bot: ${{ steps.filter.outputs.chat-summary-bot }}
      vc-disconnect-bot: ${{ steps.filter.outputs.vc-disconnect-bot }}
      discord-minutes-bot: ${{ steps.filter.outputs.discord-minutes-bot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            music-bot:
              - 'music-bot/**'
            chat-summary-bot:
              - 'chat-summary-bot/**'
            vc-disconnect-bot:
              - 'vc-disconnect-bot/**'
            discord-minutes-bot:
              - 'discord-minutes-bot/**'

  deploy-music-bot:
    needs: changes
    if: needs.changes.outputs.music-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy music-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd music-bot
            docker compose up --build -d

  deploy-chat-summary-bot:
    needs: changes
    if: needs.changes.outputs.chat-summary-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy chat-summary-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd chat-summary-bot
            docker compose up --build -d

  deploy-vc-disconnect-bot:
    needs: changes
    if: needs.changes.outputs.vc-disconnect-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy vc-disconnect-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd vc-disconnect-bot
            docker compose up --build -d

  deploy-discord-minutes-bot:
    needs: changes
    if: needs.changes.outputs.discord-minutes-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Deploy discord-minutes-bot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-discord-bot
            git pull origin main
            cd discord-minutes-bot
            docker compose up --build -d
