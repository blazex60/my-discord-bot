# DISCORD_TOKEN は config.yaml に記載しない。環境変数で設定すること。

discord:
  command_prefix: "/"

asr:
  primary_model: "whisper-large-v3"
  fallback_model: "whisper-medium"
  device: "cuda"

llm:
  model_path: "models/qwen2.5-14b-instruct-q4_k_m.gguf"
  n_ctx: 4096
  n_gpu_layers: 20
  n_threads: 8
  chunk_size_tokens: 2200

storage:
  output_dir: "output/"
  tmp_dir: "tmp/"
  warn_threshold_gb: 20
  max_recording_hours: 3

greenboost:
  enabled: false
