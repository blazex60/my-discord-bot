# DISCORD_TOKEN は config.yaml に記載しない。環境変数で設定すること。

discord:
  command_prefix: "/"

asr:
  primary_model: "whisper-medium"  # GTX 970 (4GB) では large-v3 は厳しい
  fallback_model: "whisper-base"
  device: "cuda"

llm:
  model_path: "models/qwen3.5-27b.q4_k_m.gguf"
  n_ctx: 4096
  n_gpu_layers: 20
  n_threads: 8
  chunk_size_tokens: 2200

storage:
  output_dir: "output/"
  tmp_dir: "tmp/"
  warn_threshold_gb: 20

obs:
  # OBS が出力したファイルを tmp/recordings/ に配置してください
  # 対応形式: .wav .mp4 .mkv .webm .m4a .mp3 .ogg .flac

chat:
  # チャットログ収集: /record_start を実行したチャンネルのメッセージを自動収集
  # ボットのメッセージと空メッセージは除外されます
  enabled: true

greenboost:
  enabled: false
